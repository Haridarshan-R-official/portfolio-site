<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Landing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <img src="profile.jpg" alt="Profile Image" class="profile-image">
    <div class="header-content">
      <h1>Haridarshan R</h1>
      <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
      </nav>
    </div>
  </header>
  <main class="body">
    <section id="about">
      <h2>About Me</h2>
      <p>This is the about section.</p>
    </section>
    <section id="projects">
      <h2>Projects</h2>
      <div class="project-list">
        <div class="project" id="project1" onclick="openProjectModal('modal1')">Project 1</div>
        <div class="project" id="project2" onclick="openProjectModal('modal2')">Project 2</div>
      </div>
    </section>
  </main>
  <!-- Modals -->
  <div class="modal" id="modal1">
    <div class="modal-content">
      <span class="close" onclick="closeProjectModal('modal1', 'project1')">&times;</span>
      <h3>Project 1 Details</h3>
      <p>Details about Project 1.</p>
    </div>
  </div>
  <div class="modal" id="modal2">
    <div class="modal-content">
      <span class="close" onclick="closeProjectModal('modal2', 'project2')">&times;</span>
      <h3>Project 2 Details</h3>
      <p>Details about Project 2.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
